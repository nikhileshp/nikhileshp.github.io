name: deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v3
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.1'
        bundler-cache: true
    - name: Debug secret resolution
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      run: |
        echo "NOTION_API_KEY length: ${#NOTION_API_KEY}"
        if [ -z "$NOTION_API_KEY" ]; then
          echo "RESULT: secret did NOT resolve (empty/missing)"
        else
          echo "RESULT: secret resolved (non-empty); first 4 chars: ${NOTION_API_KEY:0:4}***"
        fi
    - name: Install and Build 🔧
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        JEKYLL_ENV: production
      run: |
        npm install -g mermaid.cli
        bundle exec jekyll build
    - name: Deploy 🚀
      if: github.event_name != 'pull_request'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: _site

